name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - "apps/web/**"
      - "docs/**"
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      # New Step: Merge folders for deployment
      - name: Prepare Deployment Folder
        run: |
          mkdir public_deploy
          cp -r apps/web/build/* public_deploy/
          cp -r docs public_deploy/docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public_deploy'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4